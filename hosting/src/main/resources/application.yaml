spring:
  application:
    name: mcp-hosting
  ai:
    google:
      genai:
        api-key: GEMINI_API_KEY
        chat:
          options:
           model: gemini-3.1-flash-lite
    ollama:
      chat:
        model: gemma4
      base-url: http://localhost:11434
    mcp:
      client:
        name: doctor-mcp-client
        version: 1.0.0
        type: sync
        streamable-http:
          connections:
            mcpulsor-server:
              endpoint: mcp
              url: http://localhost:8091/mcp
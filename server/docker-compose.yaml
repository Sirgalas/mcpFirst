version: "3.9"
name: mcp-server-and-inspector

services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: http
      args:
        MODULE_DIR: server
    image: server:http
    container_name: mcp-server-http
    expose:
     - 8091
    ports:
      - "8091:8091"
  inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: mcp-inspector-http
    depends_on:
      - server
    environment:
      HOST: "0.0.0.0"
      ALLOWED_ORIGINS: "http://localhost:6274,http://127.0.0.1:6274"
    ports:
      - "6274:6274"
      - "6277:6277"